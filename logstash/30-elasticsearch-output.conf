# VigiCore Logstash Output Configuration
# ========================================
# Sends processed/enriched events from the filter pipeline to Elasticsearch.
# Events are indexed into daily rolling indices with the pattern:
#   vigicore-YYYY.MM.DD (e.g., vigicore-2026.05.13)
#
# This enables time-based index management, making it easy to implement
# retention policies (e.g., delete indices older than 90 days via ILM).
output {
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "vigicore-%{+YYYY.MM.dd}"
  }
  # stdout { codec => rubydebug } # Debugging
}
