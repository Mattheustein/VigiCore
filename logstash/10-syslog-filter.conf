# VigiCore Logstash Filter Pipeline
# ===================================
# This filter configuration processes incoming log events from Filebeat,
# applying grok pattern matching to extract structured fields from raw
# syslog and SSH authentication log messages.
#
# Filter Stages:
# 1. Syslog Parser — Extracts timestamp, hostname, program, PID, and message
# 2. SSH Auth Parser — Further extracts username, source IP, and port from:
#    a. Failed password attempts (tagged as "ssh_failed_login")
#    b. Accepted password logins (tagged as "ssh_successful_login")
# 3. System Metrics Parser — Extracts CPU, memory, and disk from custom metrics logs
#
# These structured fields are then forwarded to Elasticsearch via the output
# configuration in 30-elasticsearch-output.conf.
filter {
  # --- Stage 1: General Syslog Parsing ---
  # Matches standard syslog format: "May 13 10:15:30 hostname program[pid]: message"
  if [fields][log_type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}" }
    }
    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
  }

  # --- Stage 2: SSH Authentication Log Parsing ---
  # Applies to both auth.log and custom log sources.
  # Extracts structured fields for failed and successful SSH login events.
  if [fields][log_type] == "auth" or [fields][log_type] == "custom_logs" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:timestamp} %{SYSLOGHOST:hostname} %{DATA:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:message_content}" }
    }
    
    # 2a. Failed SSH Login Detection
    # Pattern: "Failed password for [invalid user] <user> from <ip> port <port> ssh2"
    # Adds tag "ssh_failed_login" for downstream alerting and dashboard filtering.
    if [message_content] =~ "Failed password" {
         grok {
            match => { "message_content" => "Failed password for (invalid user )?%{USERNAME:user} from %{IP:[source][ip]} port %{NUMBER:port} ssh2" }
         }
         mutate {
            add_tag => ["ssh_failed_login"]
            add_field => { "[event][action]" => "ssh_login_failed" }
            remove_field => ["message_content"]
         }
    }

    # 2b. Successful SSH Login Detection
    # Pattern: "Accepted password for <user> from <ip> port <port> ssh2"
    if [message_content] =~ "Accepted password" {
        grok {
            match => { "message_content" => "Accepted password for %{USERNAME:user} from %{IP:[source][ip]} port %{NUMBER:port} ssh2" }
        }
        mutate {
            add_tag => ["ssh_successful_login"]
            add_field => { "[event][action]" => "ssh_login_success" }
            remove_field => ["message_content"]
        }
    }

    date {
      match => [ "timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
  }

  # --- Stage 3: System Metrics Parsing ---
  # Custom log format: "<timestamp> <hostname> system-metrics: cpu=<N> memory=<N> disk=<N>"
  # Used by the SystemHealthPage for infrastructure monitoring.
  if [fields][log_type] == "custom_logs" and [message] =~ "system-metrics" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:metric_timestamp} %{SYSLOGHOST:metric_hostname} system-metrics: cpu=%{NUMBER:cpu_usage:int} memory=%{NUMBER:memory_usage:int} disk=%{NUMBER:disk_usage:int}" }
    }
    mutate {
      add_field => { "[event][dataset]" => "system_metrics" }
    }
    date {
      match => [ "metric_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
  }
}
