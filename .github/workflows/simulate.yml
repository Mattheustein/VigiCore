name: 24/7 VigiCore Traffic Simulator

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd "Cybersecurity Dashboard UI System"
          npm install firebase axios @firebase/app @firebase/firestore

      - name: Run simulator
        run: |
          cd "Cybersecurity Dashboard UI System"
          node simulate_background_traffic.mjs